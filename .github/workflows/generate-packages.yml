name: 'update plugins and themes data'

on:
  workflow_dispatch:
    inputs:
      plugin_ids:
        description: 'Space-separated plugin IDs to add/update (empty = all)'
        required: false
        default: ''
      theme_ids:
        description: 'Space-separated theme IDs to add/update (empty = all)'
        required: false
        default: ''
  schedule:
    - cron: '0 1 * * 1' # weekly Monday 1am

jobs:
  update-plugins:
    runs-on: ubuntu-latest
    timeout-minutes: 300
    permissions:
      contents: read
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    outputs:
      changed: ${{ steps.update.outputs.changed }}
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/determinate-nix-action@v3

      - name: Update plugins-data.json
        id: update
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          if [ -n "${{ github.event.inputs.plugin_ids }}" ]; then
            python3 scripts/update_plugins_data.py ${{ github.event.inputs.plugin_ids }}
          else
            python3 scripts/update_plugins_data.py
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: plugins-data
          path: |
            plugins-data.json
            broken-plugins.json

  update-themes:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    needs: update-plugins
    permissions:
      contents: read
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    outputs:
      changed: ${{ steps.update.outputs.changed }}
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/determinate-nix-action@v3

      - name: Update themes-data.json
        id: update
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          if [ -n "${{ github.event.inputs.theme_ids }}" ]; then
            python3 scripts/update_themes_data.py ${{ github.event.inputs.theme_ids }}
          else
            python3 scripts/update_themes_data.py
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: themes-data
          path: |
            themes-data.json
            broken-themes.json

  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [update-plugins, update-themes]
    permissions:
      contents: write
      pull-requests: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - uses: actions/download-artifact@v4
        with:
          name: plugins-data

      - uses: actions/download-artifact@v4
        with:
          name: themes-data

      - name: Create pull request
        if: needs.update-plugins.outputs.changed == 'true' || needs.update-themes.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git push origin --delete update/obsidian-data 2>/dev/null || true
          git checkout -b update/obsidian-data
          git add plugins-data.json themes-data.json broken-plugins.json broken-themes.json
          git commit -m "chore: update plugins and themes data"
          git push origin update/obsidian-data
          gh pr create \
            --title "Update Obsidian plugins and themes data" \
            --body "Auto-generated update to plugins-data.json and themes-data.json." \
            --base main \
            --head update/obsidian-data \
          || echo "PR already exists"

      - name: Report broken packages
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: python3 scripts/report_broken.py

      # Wiki is always regenerated — stats (downloads) change independently of package versions.
      # NOTE: The wiki must be initialised first by creating at least one page in the
      #       GitHub UI (Settings → Wiki → Create first page) before this step will work.
      - name: Generate and push wiki
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          git clone \
            "https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.wiki.git" \
            wiki-out

          python3 scripts/generate_wiki.py wiki-out/

          cd wiki-out
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if ! git diff --cached --quiet; then
            git commit -m "chore: update wiki"
            git push
          else
            echo "Wiki unchanged, nothing to push."
          fi
