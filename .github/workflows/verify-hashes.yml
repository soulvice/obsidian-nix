name: 'verify sha256 hashes'

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    - cron: '0 0 * * 1' # weekly on Monday at midnight
  workflow_dispatch:

jobs:
  verify-hashes:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/determinate-nix-action@v3

      - name: Verify and fix sha256 hashes
        id: hash_check
        run: |
          python3 <<'EOF'
          import re
          import subprocess
          import json
          import sys
          from pathlib import Path

          PLACEHOLDER_HASHES = {
              "sha256-AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=",
              "sha256-0000000000000000000000000000000000000000000=",
              "",
          }

          def resolve_vars(template, variables):
              result = template
              for key, value in variables.items():
                  result = result.replace("${" + key + "}", value)
              return result

          def get_sri_hash(url, unpack=False):
              cmd = ["nix", "store", "prefetch-file", "--json", "--hash-type", "sha256", url]
              if unpack:
                  cmd.append("--unpack")
              result = subprocess.run(cmd, capture_output=True, text=True)
              if result.returncode != 0:
                  print(f"  ERROR fetching {url}: {result.stderr.strip()}", file=sys.stderr)
                  return None
              return json.loads(result.stdout)["hash"]

          def patch_hash_attr(block, attr, existing_hash, correct):
              """Replace attr = "existing" with attr = "correct" in block."""
              return block.replace(
                  attr + ' = "' + existing_hash + '"',
                  attr + ' = "' + correct + '"',
                  1,
              )

          changed_files = []

          for nix_file in sorted(Path("packages").glob("*.nix")):
              content = nix_file.read_text()
              original = content

              # Extract simple string-only variable assignments (no interpolation)
              variables = {}
              for m in re.finditer(r'^\s*(\w+)\s*=\s*"([^"$\n]+)"', content, re.MULTILINE):
                  variables[m.group(1)] = m.group(2)
              # Also capture bare word assignments (e.g. rev = version;)
              bare_vars = {}
              for m in re.finditer(r'^\s*(\w+)\s*=\s*(\w+)\s*;', content, re.MULTILINE):
                  key, val = m.group(1), m.group(2)
                  if val in variables:
                      bare_vars[key] = variables[val]

              # ── fetchurl: url = "..." + sha256 = "..." ──────────────────────
              fetchurl_pattern = re.compile(
                  r'(url\s*=\s*"([^"]+)"[^;]*;)'
                  r'([\s\S]*?)'
                  r'(sha256\s*=\s*"([^"]*)"[^;]*;)',
                  re.MULTILINE
              )

              def patch_fetchurl(m):
                  url_template = m.group(2)
                  between = m.group(3)
                  sha256_line = m.group(4)
                  existing_hash = m.group(5)

                  url = resolve_vars(url_template, variables)
                  if "${" in url:
                      print(f"  SKIP unresolved URL: {url}")
                      return m.group(0)

                  if existing_hash and existing_hash not in PLACEHOLDER_HASHES:
                      correct = get_sri_hash(url)
                      if correct is None or correct == existing_hash:
                          if correct == existing_hash:
                              print(f"  OK   {url}")
                          return m.group(0)
                      print(f"  FIX  {url}\n       old: {existing_hash}\n       new: {correct}")
                      new_sha256_line = sha256_line.replace(existing_hash, correct)
                  else:
                      correct = get_sri_hash(url)
                      if correct is None:
                          return m.group(0)
                      print(f"  ADD  {url} -> {correct}")
                      new_sha256_line = sha256_line.replace(existing_hash, correct)

                  return m.group(1) + between + new_sha256_line

              # ── fetchFromGitHub: owner/repo/rev + hash = "..." ──────────────
              fetch_gh_pattern = re.compile(
                  r'fetchFromGitHub\s*\{([^}]*)\}',
                  re.DOTALL
              )

              def patch_fetch_from_github(m):
                  inner = m.group(1)

                  def attr(name):
                      # quoted string
                      q = re.search(r'\b' + name + r'\s*=\s*"([^"]*)"', inner)
                      if q:
                          return q.group(1)
                      # bare word resolved via variables
                      b = re.search(r'\b' + name + r'\s*=\s*(\w+)\s*;', inner)
                      if b:
                          return variables.get(b.group(1)) or bare_vars.get(b.group(1))
                      return None

                  owner = attr("owner")
                  repo  = attr("repo")
                  rev   = attr("rev")
                  existing_hash = attr("hash") or ""

                  if not all([owner, repo, rev]):
                      print(f"  SKIP fetchFromGitHub: could not resolve owner/repo/rev")
                      return m.group(0)

                  url = "https://github.com/" + owner + "/" + repo + "/archive/" + rev + ".tar.gz"

                  if existing_hash and existing_hash not in PLACEHOLDER_HASHES:
                      correct = get_sri_hash(url, unpack=True)
                      if correct is None or correct == existing_hash:
                          if correct == existing_hash:
                              print(f"  OK   {owner}/{repo}@{rev}")
                          return m.group(0)
                      print(f"  FIX  {owner}/{repo}@{rev}\n       old: {existing_hash}\n       new: {correct}")
                  else:
                      correct = get_sri_hash(url, unpack=True)
                      if correct is None:
                          return m.group(0)
                      print(f"  ADD  {owner}/{repo}@{rev} -> {correct}")

                  new_inner = patch_hash_attr(inner, "hash", existing_hash, correct)
                  return "fetchFromGitHub {" + new_inner + "}"

              print(f"\n{nix_file}:")
              new_content = fetchurl_pattern.sub(patch_fetchurl, content)
              new_content = fetch_gh_pattern.sub(patch_fetch_from_github, new_content)

              if new_content != original:
                  nix_file.write_text(new_content)
                  changed_files.append(str(nix_file))

          import os
          github_output = os.environ.get("GITHUB_OUTPUT", "/dev/null")

          if changed_files:
              print("\nChanged files: " + ", ".join(changed_files))
              with open(github_output, "a") as f:
                  f.write("changed=true\n")
                  f.write("files=" + " ".join(changed_files) + "\n")
          else:
              print("\nAll hashes are correct.")
              with open(github_output, "a") as f:
                  f.write("changed=false\n")
          EOF

      - name: Create pull request with hash fixes
        if: steps.hash_check.outputs.changed == 'true' && github.event_name != 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b fix/sha256-hashes
          git add packages/
          git commit -m "fix: update sha256 hashes for packages"
          git push origin fix/sha256-hashes --force-with-lease
          gh pr create \
            --title "Fix sha256 hashes for Obsidian plugin packages" \
            --body "$(printf 'One or more \`sha256\` hashes in \`packages/*.nix\` were incorrect or missing.\nThis PR was auto-generated by the \`verify-hashes\` workflow.\n\n**Changed files:**\n${{ steps.hash_check.outputs.files }}')" \
            --base main \
            --head fix/sha256-hashes

      - name: Fail on pull_request if hashes are wrong
        if: steps.hash_check.outputs.changed == 'true' && github.event_name == 'pull_request'
        run: |
          echo "::error::One or more sha256 hashes are incorrect. Run the verify-hashes workflow on main to auto-fix them."
          exit 1
